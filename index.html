<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Afscheid Irghin</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; background: #000;
  display: flex; align-items: center; justify-content: center;
  font-family: Arial, sans-serif;
}
#scherm {
  display: flex; flex-direction: column;
  align-items: center; gap: 28px; padding: 24px;
}
#ww {
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.5);
  border-radius: 14px; color: #fff;
  font-size: 24px; padding: 16px 28px;
  text-align: center; width: 240px; outline: none;
  letter-spacing: 6px; -webkit-tap-highlight-color: transparent;
}
#ww::placeholder { letter-spacing: 0; color: rgba(255,255,255,0.35); font-size: 15px; }
#speelLink {
  display: none;
  flex-direction: column; align-items: center; gap: 20px;
  text-decoration: none; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.play-cirkel {
  width: 120px; height: 120px; border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 3px solid rgba(255,255,255,0.85);
  display: flex; align-items: center; justify-content: center;
  font-size: 52px; padding-left: 10px;
  transition: background 0.15s, transform 0.15s;
}
#speelLink:active .play-cirkel {
  background: rgba(255,255,255,0.28); transform: scale(0.95);
}
.play-label {
  color: rgba(255,255,255,0.85);
  font-size: 18px; letter-spacing: 0.3px;
}
</style>
</head>
<body>
<div id="scherm">
  <input id="ww" type="password" placeholder="wachtwoord"
         autocomplete="off" inputmode="text" autofocus>

  <a id="speelLink"
     href="https://res.cloudinary.com/djdvgwvqz/video/upload/v1782650935/Afscheid_Irghin_1_ddrbvf.mp4"
     target="_blank" rel="noopener">
    <div class="play-cirkel">&#9654;</div>
    <div class="play-label">Klik hier om af te spelen</div>
  </a>
</div>

<script>
var ww   = document.getElementById('ww');
var link = document.getElementById('speelLink');

function check() {
  if (ww.value.trim().toLowerCase() === 'irghin') {
    ww.style.display   = 'none';
    link.style.display = 'flex';
  }
}
ww.addEventListener('input',  check);
ww.addEventListener('keyup',  check);
ww.addEventListener('change', check);
</script>
</body>
</html>
