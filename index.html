<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Afscheid Irghin</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; background: #000;
  display: flex; align-items: center; justify-content: center;
  font-family: Arial, sans-serif; overflow: hidden;
}

/* --- Wachtwoord scherm --- */
#login {
  display: flex; flex-direction: column;
  align-items: center; gap: 24px;
}
#login h2 {
  color: rgba(255,255,255,0.7);
  font-size: 16px; font-weight: normal; letter-spacing: 0.5px;
}
#ww {
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.5);
  border-radius: 14px; color: #fff;
  font-size: 24px; padding: 16px 28px;
  text-align: center; width: 240px; outline: none;
  letter-spacing: 6px; -webkit-tap-highlight-color: transparent;
}
#ww::placeholder { letter-spacing: 0; color: rgba(255,255,255,0.35); font-size: 15px; }

/* --- Video scherm --- */
#videoscherm {
  display: none;
  position: fixed; inset: 0;
  background: #000;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 20px;
}
#vid {
  width: 100%; height: 100%;
  max-height: 100vh;
  object-fit: contain;
  background: #000;
}
</style>
</head>
<body>

<div id="login">
  <h2>Voer wachtwoord in</h2>
  <input id="ww" type="password" placeholder="wachtwoord" autocomplete="off"
         inputmode="text" autofocus>
</div>

<div id="videoscherm">
  <video id="vid"
    controls
    playsinline
    webkit-playsinline
    preload="metadata"
    src="https://res.cloudinary.com/djdvgwvqz/video/upload/v1782650935/Afscheid_Irghin_1_ddrbvf.mp4">
  </video>
</div>

<script>
var ww          = document.getElementById('ww');
var login       = document.getElementById('login');
var videoscherm = document.getElementById('videoscherm');
var vid         = document.getElementById('vid');

function onInput() {
  if (ww.value.trim().toLowerCase() !== 'irghin') return;

  login.style.display       = 'none';
  videoscherm.style.display = 'flex';

  // Probeer autoplay — als browser weigert, gebruiker tikt zelf op play-knop
  try { vid.play(); } catch(e) {}
}

ww.addEventListener('input',  onInput);
ww.addEventListener('keyup',  onInput);
ww.addEventListener('change', onInput);
</script>
</body>
</html>
