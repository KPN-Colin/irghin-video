<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Afscheid Irghin</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #000; overflow: hidden; }

#vid {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  background: #000; object-fit: contain;
  display: block;
}

#overlay {
  position: fixed; inset: 0;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  z-index: 10;
}

#ww {
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.5);
  border-radius: 14px; color: #fff;
  font-size: 24px; padding: 16px 28px;
  text-align: center; width: 240px; outline: none;
  letter-spacing: 6px; font-family: Arial, sans-serif;
  -webkit-tap-highlight-color: transparent;
}
#ww::placeholder {
  letter-spacing: 0; color: rgba(255,255,255,0.35); font-size: 15px;
}
</style>
</head>
<body>

<!-- Video laadt meteen in achtergrond -->
<video id="vid"
  controls
  playsinline
  webkit-playsinline
  preload="auto"
  src="https://res.cloudinary.com/djdvgwvqz/video/upload/v1782650935/Afscheid_Irghin_1_ddrbvf.mp4">
</video>

<!-- Wachtwoord-overlay bovenop -->
<div id="overlay">
  <input id="ww" type="password" placeholder="wachtwoord"
         autocomplete="off" inputmode="text" autofocus>
</div>

<script>
var ww      = document.getElementById('ww');
var overlay = document.getElementById('overlay');
var vid     = document.getElementById('vid');

function check() {
  if (ww.value.trim().toLowerCase() !== 'irghin') return;
  overlay.style.display = 'none';
  vid.play();
}

ww.addEventListener('input',  check);
ww.addEventListener('keyup',  check);
ww.addEventListener('change', check);
</script>
</body>
</html>
